<!DOCTYPE html>
<html>
<head>
    <title>Kickguessr - Level Mode</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; }
        .container { max-width: 600px; margin: auto; }
        .level-badge { background: #00ff00; color: black; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .path-box { background: #2a2a2a; padding: 30px; border-radius: 15px; margin: 20px auto; border-bottom: 4px solid #00ff00; font-size: 1.2rem; line-height: 1.6; }
        input { padding: 12px; width: 70%; border-radius: 5px; border: none; font-size: 1rem; }
        button { padding: 12px 25px; background: #00ff00; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #00cc00; transform: scale(1.05); }
        #result-message { margin-top: 20px; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Kickguessr</h1>
        <div id="level-num" class="level-badge">Level 1</div>
        <p>Identify the player by their transfers:</p>
        
        <div id="path-display" class="path-box">Loading Level...</div>
        
        <input type="text" id="guess-input" placeholder="Who is this player?" onkeyup="if(event.key==='Enter') checkGuess()">
        <button onclick="checkGuess()">GUESS</button>
        
        <p id="result-message"></p>
    </div>

    <script>
        let currentLevel = 1;

        async function loadLevel(level) {
            document.getElementById('result-message').innerText = "";
            document.getElementById('guess-input').value = "";
            const response = await fetch(`/api/level/${level}`);
            
            if (response.status === 404) {
                document.getElementById('path-display').innerText = "🏆 YOU BEAT THE GAME!";
                return;
            }

            const data = await response.json();
            document.getElementById('path-display').innerText = data.path;
            document.getElementById('level-num').innerText = `Level ${level}`;
        }

        async function checkGuess() {
            const guess = document.getElementById('guess-input').value;
            const response = await fetch('/api/guess', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ guess: guess, id: currentLevel })
            });
            
            const result = await response.json();
            const msgElement = document.getElementById('result-message');
            
            if (result.correct) {
                msgElement.style.color = "#00ff00";
                msgElement.innerText = "GOAL! Correct!";
                currentLevel++;
                setTimeout(() => loadLevel(currentLevel), 1500);
            } else {
                msgElement.style.color = "#ff4444";
                msgElement.innerText = "MISS! Try again.";
            }
        }

        loadLevel(currentLevel);
    </script>
</body>
</html>
