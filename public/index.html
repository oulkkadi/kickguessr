<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kickguessr - Football Quiz</title>
    <style>
        body { 
            background: linear-gradient(rgba(18, 18, 18, 0.85), rgba(18, 18, 18, 0.85)), 
            url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card { 
            background: rgba(30, 30, 30, 0.95); 
            padding: 30px; 
            border-radius: 20px; 
            max-width: 400px; 
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-bottom: 6px solid #00ff00;
            text-align: center;
        }

        h1 { margin-top: 0; font-size: 2rem; letter-spacing: -1px; }

        .path { 
            font-size: 1.1rem; 
            margin: 25px 0; 
            color: #00ff00; 
            font-weight: bold; 
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-top: 20px; 
        }

            padding: 15px 10px;
