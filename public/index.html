<!DOCTYPE html>
<html>
<head>
    <title>Kickguessr</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
    background: linear-gradient(rgba(18, 18, 18, 0.8), rgba(18, 18, 18, 0.8)), 
    url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=2070&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
} 
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; max-width: 450px; margin: auto; border-bottom: 5px solid #00ff00; }
        .path { font-size: 1.2rem; margin: 20px 0; color: #00ff00; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { background: #333; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        button:hover { background: #444; }
        .status { margin-top: 20px; font-weight: bold; height: 20px; }
        .level-tag { background: #00ff00; color: black; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚽ Kickguessr</h1>
        <span id="level-tag" class="level-tag">LEVEL 1</span>
        <p>Which player had this career path?</p>
        <div id="path-display" class="path">Loading...</div>
        <div id="btn-grid" class="grid"></div>
        <div id="status" class="status"></div>
    </div>

    <script>
        let currentLevel = 1;

        async function start() {
            const res = await fetch(`/api/level/${currentLevel}`);
            if (res.status === 404) {
                document.querySelector('.card').innerHTML = "<h1>🏆 CHAMPION!</h1><p>You guessed them all!</p>";
                return;
            }
            const data = await res.json();
            document.getElementById('path-display').innerText = data.path;
            document.getElementById('level-tag').innerText = `LEVEL ${currentLevel}`;
            
            const grid = document.getElementById('btn-grid');
            grid.innerHTML = "";
            data.choices.forEach(name => {
                const b = document.createElement('button');
                b.innerText = name;
                b.onclick = () => check(name);
                grid.appendChild(b);
            });
        }

        async function check(name) {
            const res = await fetch('/api/guess', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ guess: name, id: currentLevel })
            });
            const result = await res.json();
            const status = document.getElementById('status');
            if (result.correct) {
                status.innerText = "✅ CORRECT!";
                status.style.color = "#00ff00";
                currentLevel++;
                setTimeout(start, 1000);
            } else {
                status.innerText = "❌ WRONG!";
                status.style.color = "#ff4444";
            }
        }
        start();
    </script>
</body>
</html>
